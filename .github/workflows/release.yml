name: Release

# release-please manages versioning from conventional commits: it opens a
# release PR, and merging it creates the GitHub release + tag. The build job
# then compiles macOS binaries and attaches them to that release.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    # Single arm64 runner (macos-14) builds BOTH arches and lipos them into one
    # universal binary — GitHub's Intel macos-13 runners are scarce and queue for
    # hours. brew's libndi.dylib and the Syphon.framework are both built universal,
    # so cross-compiling x86_64 on the arm64 runner links cleanly.
    runs-on: macos-14
    timeout-minutes: 60
    name: Build (macOS universal)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install libndi (universal NDI runtime)
        run: brew install libndi

      - name: Build Syphon.framework (universal)
        run: |
          set -euo pipefail
          cd vendor/syphon-src
          xcodebuild -project Syphon.xcodeproj -scheme Syphon -configuration Release \
            -derivedDataPath build SYMROOT="$PWD/build" ONLY_ACTIVE_ARCH=NO
          cd "$GITHUB_WORKSPACE"
          rm -rf vendor/Syphon.framework
          cp -R vendor/syphon-src/build/Release/Syphon.framework vendor/Syphon.framework

      - name: Fetch LINE Seed JP (bundled by the GUI)
        run: ./scripts/fetch-fonts.sh

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build both arches (CLI + GUI)
        run: |
          cargo build --release --features gui --target aarch64-apple-darwin
          cargo build --release --features gui --target x86_64-apple-darwin

      - name: Package universal
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          stage="${TAG}-macos-universal"
          mkdir -p "$stage"
          # Combine each per-arch binary into one universal Mach-O.
          for bin in ndi-share ndi-share-gui; do
            lipo -create \
              "target/aarch64-apple-darwin/release/$bin" \
              "target/x86_64-apple-darwin/release/$bin" \
              -output "$stage/$bin"
          done
          cp -R vendor/Syphon.framework "$stage/"
          cp README.md README.en.md THIRD-PARTY-NOTICES "$stage/"
          # Let the binaries find the colocated (universal) Syphon.framework at
          # runtime. (libndi must be installed via `brew install libndi`.)
          install_name_tool -add_rpath @loader_path "$stage/ndi-share"
          install_name_tool -add_rpath @loader_path "$stage/ndi-share-gui"
          tar -czf "${stage}.tar.gz" "$stage"
          echo "ASSET=${stage}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" "$ASSET" --clobber
